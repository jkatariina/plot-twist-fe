<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Profile - Plot Twist</title>
    <link rel="stylesheet" href="/styles/style.css"/>
    <link rel="stylesheet" href="/styles/index.css"/>
    <link rel="stylesheet" href="/styles/profile.css"/>
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <nav class="nav">
        <a href="index.html" class="logo">Plot Twist</a>
        <input type="checkbox" id="menu-toggle"/>
        <label for="menu-toggle" class="menu-icon">
          <i class="fa-solid fa-bars hamburger"></i>
          <i class="fa-solid fa-xmark close"></i>
        </label>
        <ul class="nav-links">
          <li><a href="/add-plant.html" class="add-plant">Add plant</a></li>
          <li id="loginItem"><a href="/login.html">Log in</a></li>
          <li><a href="/map.html">Map</a></li>
          <!-- <li class="account-item" id="accountItem"><a href="/register.html">Create new acount</a></li> -->
          <li class="profile-item" id="profileItem"><a href="/profile.html">Profile</a></li>
          <li class="logout-item" id="logoutItem"><a href="/index.html" id="logoutBtn">Log out</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="profile">
      <div id="pageLoader" class="page-loader">
        <div>
          <i class="fa-solid fa-spinner fa-spin"></i>
        </div>
      </div>
      <!-- PROFILE -->
      <div class="profile-left">
        <div class="avatar-wrapper">
          <div class="avatar-overlay"></div>
          <div class="plant-media">
            <img id="userImage" class="avatar" alt="Profile picture"/>
            <button id="editImageBtn" class="edit-btn-avatar" aria-label="Edit profile picture">
              <i class="fa-solid fa-pen"></i>
            </button>
          </div>
        </div>
        <div class="profile-meta">
          <div class="profile-name">
            <h1 id="profileName"></h1>
            <button id="editNameBtn" class="edit-btn">
              <i class="fa-solid fa-pen"></i>
            </button>
          </div>
          <p id="profileEmail"></p>
          <div class="profile-badges">
            <span class="badge" id="plantCountBadge"></span>
            <span class="badge" id="userStatusBadge"></span>
          </div>
        </div>
      </div>
      <div class="profile-grid">
        <!-- LEFT -->
        <section class="profile-plants">
          <h2>Active plant listings</h2>
            <div id="plantsContainer"></div>
          <div class="about-box">
            <div class="about">
              <h2>About</h2>
              <button id="editAboutBtn" class="edit-btn" aria-label="Edit about">
                <i class="fa-solid fa-pen"></i>
              </button>
            </div>
            <p id="profileAbout"></p>
          </div>
        </section>
        <!-- RIGHT -->
        <section class="profile-activity">
          <h2>Active trades</h2>
          <div id="activeTradesContainer"></div>
          <h2>Completed trades</h2>
          <div id="completedTradesContainer"></div>
        </section>
      </div>
    </main>
    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2026 Plot Twist. All rights reserved.</p>
        <div class="footer-links">
          <a href="/map.html">Map</a>
          <a href="/add-plant.html">Add plant</a>
          <a href="/profile.html">Profile</a>
        </div>
      </div>
    </footer>
    <script type="module" src="/src/scripts/profile.js"></script>
    <script type="module" src="/src/scripts/navbar.js"></script>
  </body>
</html>
