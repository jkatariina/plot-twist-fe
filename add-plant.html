<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Plant - Plot Twist</title>
    <link rel="stylesheet" href="/styles/style.css" />
    <link rel="stylesheet" href="/styles/add-plant.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a href="index.html" class="logo">Plot Twist</a>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">
          <i class="fa-solid fa-bars hamburger"></i>
          <i class="fa-solid fa-xmark close"></i>
        </label>
        <ul class="nav-links">
          <li><a href="/add-plant.html" class="add-plant">Add plant</a></li>
          <li id="loginItem"><a href="/login.html">Log in</a></li>
          <li><a href="/map.html">Map</a></li>
          <!-- <li class="account-item" id="accountItem"><a href="/register.html">Create new acount</a></li> -->
          <li class="profile-item" id="profileItem"><a href="/profile.html">Profile</a></li>
          <li class="logout-item" id="logoutItem"><a href="/index.html" id="logoutBtn">Log out</a>
        </ul>
      </nav>
    </header>

    <main class="add-plant-page">
      <section class="add-plant-header">
        <h1>Add a plant</h1>
        <p>Share your plant with the community and start swapping.</p>
      </section>

      <section class="add-plant-card">
        <form id="addPlantForm" class="add-plant-form">
          <label for="plant-name">Plant name</label>
          <input type="text" id="plant-name" name="plant-name" placeholder="Monstera Deliciosa" />

          <label for="plant-location">Location</label>
          <select id="plant-location" name="plant-location">
            <option value="stockholm">Stockholm</option>
            <option value="goteborg">Göteborg</option>
            <option value="malmo">Malmö</option>
            <option value="sundsvall">Sundsvall</option>

          </select>

          <label for="plant-image">Plant image</label>
          <input type="file" id="plant-image" name="plant-image" accept="image/jpeg, image/png" required />

          <label for="plant-light">Light level</label>
          <select id="plant-light" name="plant-light">
            <option value="1">1 - Low light</option>
            <option value="2">2 - Medium light</option>
            <option value="3" selected>3 - Bright light</option>
          </select>

          <label for="plant-description">Description</label>
          <textarea
            id="plant-description"
            name="plant-description"
            rows="5"
            placeholder="Tell others a bit about your plant..."
          ></textarea>

          <button type="submit" class="submit-btn">Add plant</button>
        </form>
      </section>
    </main>
    <div id="authModal" class="auth-modal hidden">
      <div class="auth-modal-content">
        <h2>Log in to add plant</h2>

        <div class="auth-modal-actions">
          <a href="/login.html" class="auth-btn">Log in</a>
          <a href="/register.html" class="auth-btn secondary">Create account</a>
        </div>

          <button id="closeAuthModal" class="close-auth-modal">Close</button>

      </div>
    </div>

    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2026 Plot Twist. All rights reserved.</p>
        <div class="footer-links">
          <a href="/map.html">Map</a>
          <a href="/add-plant.html">Add plant</a>
          <a href="/profile.html">Profile</a>
        </div>
      </div>
    </footer>

    <script type="module" src="/src/scripts/add-plant.js"></script>
    <script type="module" src="./src/scripts/navbar.js"></script>
  </body>
</html>
